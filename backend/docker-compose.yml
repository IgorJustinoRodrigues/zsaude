name: zsaude-backend

services:
  postgres:
    # Imagem oficial do pgvector, baseada em Postgres 17.
    # Necessária para a extensão `vector` usada no reconhecimento facial.
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zsaude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zsaude_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-zsaude}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zsaude} -d ${POSTGRES_DB:-zsaude}"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8008:8000"
    env_file:
      - .env
    volumes:
      # Cache persistente dos modelos do InsightFace (~320 MB na primeira
      # execução). Sem este volume, cada rebuild baixa tudo de novo.
      - insightface_models:/home/app/.insightface
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  valkey_data:
  insightface_models:
