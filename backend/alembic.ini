[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8
file_template = %%(year)04d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(slug)s

# URL lida em migrations/env.py a partir de Settings
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
