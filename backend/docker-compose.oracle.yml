name: zsaude-backend-oracle

# Configuração para rodar o zSaúde com Oracle como banco principal.
# Uso: docker compose -f docker-compose.oracle.yml up
#
# A app vai usar DATABASE_URL=oracle+oracledb://... automaticamente.
# pgvector (reconhecimento facial) fica desabilitado neste modo.

services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle_dev}
      APP_USER: ${ORACLE_APP_USER:-zsaude}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD:-zsaude_dev_password}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM dual;' | sqlplus -s ${ORACLE_APP_USER:-zsaude}/${ORACLE_APP_PASSWORD:-zsaude_dev_password}@localhost:1521/FREEPDB1 | grep -q '1'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8008:8000"
    env_file:
      - .env.oracle
    volumes:
      - insightface_models:/home/app/.insightface
      - ./secrets:/app/secrets:ro
    depends_on:
      oracle:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  oracle_data:
  valkey_data:
  insightface_models:
