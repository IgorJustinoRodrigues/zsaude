# Overrides de desenvolvimento: hot-reload e volumes locais.
# docker-compose carrega este arquivo automaticamente em cima do docker-compose.yml

services:
  app:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./migrations_tenant:/app/migrations_tenant
      - ./scripts:/app/scripts
      - ./secrets:/app/secrets
      - ./alembic.ini:/app/alembic.ini
      - ./alembic_tenant.ini:/app/alembic_tenant.ini
    environment:
      DEBUG: "true"
